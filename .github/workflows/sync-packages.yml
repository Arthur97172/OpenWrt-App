          RESPONSE_CORE=$(curl -sL "https://api.github.com/repos/timsaya/openwrt-bandix/releases/latest")

          # 提取所有资产链接
          for url in $(echo "$RESPONSE_CORE" | jq -r '.assets[] | .browser_download_url'); do
