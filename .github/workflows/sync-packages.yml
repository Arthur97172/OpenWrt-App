              # 判断是 apk 还是 ipk 决定主目录
              if [[ "$filename" == *".apk" ]]; then
                type_dir="apk"
              elif [[ "$filename" == *".ipk" ]]; then
                type_dir="ipk"
              else
                continue # 忽略其他格式的文件
              fi

              # ---------------- 精准微架构匹配 ----------------
              if [[ "$filename" == *"x86_64"* ]]; then
                # x86_64 包
                curl -sL "$url" -o "$type_dir/x86_64/bandix/$filename" 2>/dev/null || true
                echo "  🎯 Core: $filename -> $type_dir/x86_64/bandix/"

