                curl -sL "$url" -o "apk/$arch/bandix/$filename" 2>/dev/null || true
              done
              echo "  📦 APK: $filename (全架构复制)"
            fi
          done

          # 下载 IPK
          for url in $(echo "$RESPONSE_LUCI" | jq -r '.assets[] | select(.name | endswith(".ipk")) | .browser_download_url'); do
            if [ -n "$url" ]; then
              filename=$(basename "$url")
              for arch in x86_64 aarch64_cortex-a53 aarch64_generic; do
                curl -sL "$url" -o "ipk/$arch/bandix/$filename" 2>/dev/null || true
              done
