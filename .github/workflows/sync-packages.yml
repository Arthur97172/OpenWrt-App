                curl -sL "$url" -o "$type_dir/aarch64_generic/bandix/$filename" 2>/dev/null || true
                echo "  🎯 Core: $filename -> $type_dir/aarch64_generic/bandix/"

              elif [[ "$filename" == *"_all"* ]]; then
                # 通用包放行到所有架构
                for arch in x86_64 aarch64_cortex-a53 aarch64_generic; do
                  curl -sL "$url" -o "$type_dir/$arch/bandix/$filename" 2>/dev/null || true
                done
                echo "  🎯 Core: $filename -> 全架构复制(_all)"

              else
                # 自动跳过不属于你目标架构的文件（比如 cortex-a72, cortex-a76）
                echo "  ↷ 跳过无关架构文件: $filename"
              fi

            fi
          done

