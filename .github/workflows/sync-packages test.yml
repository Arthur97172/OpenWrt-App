name: Sync OpenWrt Packages Test

on:
  schedule:
    - cron: '0 3 * * 0'  # 每周日凌晨3点执行
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Download and sync easytier packages
        run: |
          RESPONSE=$(curl -sL "https://api.github.com/repos/nikkinikki-org/OpenWrt-nikki/releases/latest")

          # 调试日志：打印一下 API 返回的信息，方便排查仓库是否真的存在 Release
          echo "=== API 返回状态检查 ==="
          echo "$RESPONSE" | jq -r '.message // "成功获取到 Release 数据"'
          echo "========================"

          mkdir -p apk/x86_64/nikki apk/aarch64_cortex-a53/nikki apk/aarch64_generic/nikki
          mkdir -p ipk/x86_64/nikki ipk/aarch64_cortex-a53/nikki ipk/aarch64_generic/nikki
          rm -f apk/*/nikki/* ipk/*/nikki/* 2>/dev/null || true

          # ==================== 1. 下载并解压 APK (25.12) ====================
          for arch in x86_64 aarch64_cortex-a53 aarch64_generic; do
            echo "=== nikki APK $arch ==="
            # 改用 .?assets[] 容错，并使用 contains 组合匹配
            TARGZ_URL=$(echo "$RESPONSE" | jq -r "..?assets[]? | select(.name | contains(\"nikki_${arch}\") and contains(\"25.12\") and contains(\".tar.gz\")) | .browser_download_url" 2>/dev/null)

            if [ -n "$TARGZ_URL" ] && [ "$TARGZ_URL" != "null" ]; then
              TEMP_DIR=$(mktemp -d)
              curl -sL "$TARGZ_URL" -o "$TEMP_DIR/nikki.tar.gz" 2>/dev/null || true
              tar -xzf "$TEMP_DIR/nikki.tar.gz" -C "$TEMP_DIR" 2>/dev/null || true
              find "$TEMP_DIR" -name "*.apk" -exec mv {} "apk/$arch/nikki/" \; 2>/dev/null || true
              ls "apk/$arch/nikki/" 2>/dev/null | head -5 || echo "  (目录为空)"
              rm -rf "$TEMP_DIR" 2>/dev/null || true
            else
              echo "  未找到 APK"
            fi
          done

          # ==================== 2. 下载并解压 IPK (24.10) ====================
          for arch in x86_64 aarch64_cortex-a53 aarch64_generic; do
            echo "=== nikki IPK $arch ==="
            # 改用 .?assets[] 容错，并使用 contains 组合匹配
            TARGZ_URL=$(echo "$RESPONSE" | jq -r "..?assets[]? | select(.name | contains(\"nikki_${arch}\") and contains(\"24.10\") and contains(\".tar.gz\")) | .browser_download_url" 2>/dev/null)

            if [ -n "$TARGZ_URL" ] && [ "$TARGZ_URL" != "null" ]; then
              TEMP_DIR=$(mktemp -d)
              curl -sL "$TARGZ_URL" -o "$TEMP_DIR/nikki.tar.gz" 2>/dev/null || true
              tar -xzf "$TEMP_DIR/nikki.tar.gz" -C "$TEMP_DIR" 2>/dev/null || true
              find "$TEMP_DIR" -name "*.ipk" -exec mv {} "ipk/$arch/nikki/" \; 2>/dev/null || true
              ls "ipk/$arch/nikki/" 2>/dev/null | head -5 || echo "  (目录为空)"
              rm -rf "$TEMP_DIR" 2>/dev/null || true
            else
              echo "  未找到 IPK"
            fi
          done

      - name: Commit and push changes
        run: |
          # 过滤非 zh-cn 语言包
          echo "=== 过滤语言包 ==="
          for dir in apk/*/* ipk/*/*; do
            [ -d "$dir" ] || continue
            for file in "$dir"/*; do
              [ -f "$file" ] || continue
              # 删除 luci-i18n 开头的非 zh-cn 语言包
              if [[ $(basename "$file") == luci-i18n-* ]] && [[ ! $(basename "$file") =~ -zh-cn ]]; then
                rm -f "$file"
                echo "  删除: $(basename "$file")"
              fi
            done
          done

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add -A

          if git diff --staged --quiet; then
              echo "没有检测到文件更改，跳过提交"
            else
              git diff --staged --stat
              git commit -m "自动同步 OpenWrt 软件包 - $(date +'%Y-%m-%d %H:%M:%S')"
              
              # === 关键修复步骤 ===
              # 1. 尝试拉取远程最新代码并变基，如果因为冲突失败则取消变基
              git pull --rebase origin main || git rebase --abort
              
              # 2. 重新推送
              git push origin main
            fi
