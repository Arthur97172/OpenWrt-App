name: Sync OpenWrt Packages Test

on:
  schedule:
    - cron: '0 3 * * 0'  # 每周日凌晨3点执行
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Download and sync easytier packages
        run: |
          RESPONSE=$(curl -sL "https://api.github.com/repos/EasyTier/luci-app-easytier/releases/latest")

          mkdir -p apk/x86_64/easytier apk/aarch64_cortex-a53/easytier apk/aarch64_generic/easytier
          mkdir -p ipk/x86_64/easytier ipk/aarch64_cortex-a53/easytier ipk/aarch64_generic/easytier
          rm -f apk/*/easytier/* ipk/*/easytier/* 2>/dev/null || true

          # ==================== 1. 处理 APK (.zip) ====================
          for arch in x86_64 aarch64_cortex-a53 aarch64_generic; do
            echo "=== easytier APK $arch ==="
            # 修复点：改用简单的 contains 和 test，避开多重反斜杠转义
            ZIP_URL=$(echo "$RESPONSE" | jq -r ".assets[] | select(.name | contains(\"${arch}-\") and test(\"SNAPSHOT.zip$\")) | .browser_download_url")

            if [ -n "$ZIP_URL" ] && [ "$ZIP_URL" != "null" ]; then
              TEMP_DIR=$(mktemp -d)
              curl -sL "$ZIP_URL" -o "$TEMP_DIR/easytier_apk.zip" 2>/dev/null || true
              unzip -q "$TEMP_DIR/easytier_apk.zip" -d "$TEMP_DIR" 2>/dev/null || true
              find "$TEMP_DIR" -name "*.apk" -exec mv {} "apk/$arch/easytier/" \; 2>/dev/null || true
              ls "apk/$arch/easytier/" 2>/dev/null | head -5 || echo "  (目录为空)"
              rm -rf "$TEMP_DIR" 2>/dev/null || true
            else
              echo "  未找到 APK"
            fi
          done

          # ==================== 2. 处理 IPK (.zip) ====================
          for arch in x86_64 aarch64_cortex-a53 aarch64_generic; do
            echo "=== easytier IPK $arch ==="
            # 修复点：通过同时包含 架构名 且“不包含” SNAPSHOT 来精准锁定 IPK 压缩包
            ZIP_URL=$(echo "$RESPONSE" | jq -r ".assets[] | select(.name | contains(\"${arch}-\") and (contains(\"SNAPSHOT\") | not) and test(\".zip$\")) | .browser_download_url")

            if [ -n "$ZIP_URL" ] && [ "$ZIP_URL" != "null" ]; then
              TEMP_DIR=$(mktemp -d)
              curl -sL "$ZIP_URL" -o "$TEMP_DIR/easytier_ipk.zip" 2>/dev/null || true
              unzip -q "$TEMP_DIR/easytier_ipk.zip" -d "$TEMP_DIR" 2>/dev/null || true
              find "$TEMP_DIR" -name "*.ipk" -exec mv {} "ipk/$arch/easytier/" \; 2>/dev/null || true
              ls "ipk/$arch/easytier/" 2>/dev/null | head -5 || echo "  (目录为空)"
              rm -rf "$TEMP_DIR" 2>/dev/null || true
            else
              echo "  未找到 IPK"
            fi
          done

      - name: Commit and push changes
        run: |
          # 过滤非 zh-cn 语言包
          echo "=== 过滤语言包 ==="
          for dir in apk/*/* ipk/*/*; do
            [ -d "$dir" ] || continue
            for file in "$dir"/*; do
              [ -f "$file" ] || continue
              # 删除 luci-i18n 开头的非 zh-cn 语言包
              if [[ $(basename "$file") == luci-i18n-* ]] && [[ ! $(basename "$file") =~ -zh-cn ]]; then
                rm -f "$file"
                echo "  删除: $(basename "$file")"
              fi
            done
          done

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add -A

          if git diff --staged --quiet; then
              echo "没有检测到文件更改，跳过提交"
            else
              git diff --staged --stat
              git commit -m "自动同步 OpenWrt 软件包 - $(date +'%Y-%m-%d %H:%M:%S')"
              
              # === 关键修复步骤 ===
              # 1. 尝试拉取远程最新代码并变基，如果因为冲突失败则取消变基
              git pull --rebase origin main || git rebase --abort
              
              # 2. 重新推送
              git push origin main
            fi
