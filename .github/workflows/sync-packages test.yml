name: Sync OpenWrt Packages Test

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨2点执行
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and sync rtp2httpd packages
        run: |
          # 1. 创建目标目录并清理旧文件
          mkdir -p apk/x86_64/rtp2httpd apk/aarch64_cortex-a53/rtp2httpd apk/aarch64_generic/rtp2httpd
          mkdir -p ipk/x86_64/rtp2httpd ipk/aarch64_cortex-a53/rtp2httpd ipk/aarch64_generic/rtp2httpd
          rm -f apk/*/rtp2httpd/* ipk/*/rtp2httpd/* 2>/dev/null || true

          # =================================================================
          # 2. 下载 rtp2httpd 相关包
          # =================================================================
          echo "🌐 正在获取 rtp2httpd 内核及面板包最新 Release..."
          RESPONSE_CORE=$(curl -sL "https://api.github.com/repos/stackia/rtp2httpd/releases/latest")

          # 提取所有资产链接
          for url in $(echo "$RESPONSE_CORE" | jq -r '.assets[] | .browser_download_url'); do
            if [ -n "$url" ]; then
              filename=$(basename "$url")
              
              # 判断是 apk 还是 ipk 决定主目录
              if [[ "$filename" == *".apk" ]]; then
                type_dir="apk"
              elif [[ "$filename" == *".ipk" ]]; then
                type_dir="ipk"
              else
                continue # 忽略其他格式的文件
              fi

              # ---------------- 优先判断：通用面板与语言包 ----------------
              if [[ "$filename" == *"luci-app-"* ]] || [[ "$filename" == *"luci-i18n-"* ]] || [[ "$filename" == *"_all"* ]]; then
                # 面板包、语言包或明确标记 _all 的包，放行到所有架构
                for arch in x86_64 aarch64_cortex-a53 aarch64_generic; do
                  curl -sL "$url" -o "$type_dir/$arch/rtp2httpd/$filename" 2>/dev/null || true
                done
                echo "  🎯 Universal: $filename -> 全架构复制"

              # ---------------- 精准微架构匹配 (针对内核/二进制包) ----------------
              elif [[ "$filename" == *"x86_64"* ]]; then
                curl -sL "$url" -o "$type_dir/x86_64/rtp2httpd/$filename" 2>/dev/null || true
                echo "  🎯 Core: $filename -> $type_dir/x86_64/rtp2httpd/"

              elif [[ "$filename" == *"aarch64_cortex-a53"* ]]; then
                curl -sL "$url" -o "$type_dir/aarch64_cortex-a53/rtp2httpd/$filename" 2>/dev/null || true
                echo "  🎯 Core: $filename -> $type_dir/aarch64_cortex-a53/rtp2httpd/"

              elif [[ "$filename" == *"aarch64_generic"* ]]; then
                curl -sL "$url" -o "$type_dir/aarch64_generic/rtp2httpd/$filename" 2>/dev/null || true
                echo "  🎯 Core: $filename -> $type_dir/aarch64_generic/rtp2httpd/"

              else
                # 自动跳过不属于你目标架构的文件（比如 cortex-a72, cortex-a76 等内核包）
                echo "  ↷ 跳过无关架构文件: $filename"
              fi

            fi
          done

      - name: Commit and push changes
        run: |
          # 过滤非 zh-cn 语言包
          echo "=== 过滤语言包 ==="
          for dir in apk/*/* ipk/*/*; do
            [ -d "$dir" ] || continue
            for file in "$dir"/*; do
              [ -f "$file" ] || continue
              # 删除 luci-i18n 开头的非 zh-cn 语言包
              if [[ $(basename "$file") == luci-i18n-* ]] && [[ ! $(basename "$file") =~ -zh-cn ]]; then
                rm -f "$file"
                echo "  删除: $(basename "$file")"
              fi
            done
          done

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add -A

          if git diff --staged --quiet; then
            echo "没有检测到文件更改，跳过提交"
          else
            git diff --staged --stat
            git commit -m "自动同步 OpenWrt 软件包 - $(date +'%Y-%m-%d %H:%M:%S')"
            git push || true
          fi

